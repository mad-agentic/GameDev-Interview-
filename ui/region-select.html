<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      cursor: crosshair;
      background: rgba(0,0,0,0.45);
      user-select: none;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }
    #hint {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,17,23,0.95);
      color: #e2e8f0;
      padding: 9px 22px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #hint kbd {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: #a78bfa;
    }
    #sel {
      position: fixed;
      border: 2px solid #3b82f6;
      background: rgba(59,130,246,0.08);
      display: none;
      pointer-events: none;
    }
    #sel::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px dashed rgba(255,255,255,0.3);
    }
    #size-label {
      position: fixed;
      font-size: 11px;
      font-family: monospace;
      color: #7dd3fc;
      background: rgba(0,0,0,0.75);
      padding: 2px 7px;
      border-radius: 3px;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="hint">Kéo để chọn vùng CC &nbsp;·&nbsp; <kbd>Esc</kbd> để hủy</div>
  <div id="sel"></div>
  <div id="size-label"></div>
  <script src="region-select.js"></script>
</body>
</html>
