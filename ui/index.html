<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameDev Copilot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="titlebar">
    <span>🎮 GameDev Copilot</span>
    <div class="titlebar-actions">
      <button id="save-btn" title="Save session to Desktop">💾</button>
      <button id="settings-btn" title="Settings">⚙</button>
      <button id="close-btn" title="Close"></button>
    </div>
  </div>

  <div id="controls">
    <select id="device-select">
      <option value="">Loading devices...</option>
    </select>
    <button id="start-btn">▶ Start</button>
    <button id="stop-btn">■ Stop</button>
  </div>

  <div id="status-bar">Ready — Ctrl+Shift+Space to hide</div>

  <div id="results">
    <div class="empty-hint">
      Select a device and press Start.<br/>
      Or use <strong>Ask</strong> to practice manually.
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="bottom-panel" style="display:none">
    <div class="panel-row">
      <label>Delay</label>
      <select id="setting-chunks">
        <option value="5">Fast (~0.5s)</option>
        <option value="10" selected>Normal (~1s)</option>
        <option value="20">Slow (~2s)</option>
      </select>
    </div>
    <div class="panel-row">
      <label>Min words</label>
      <select id="setting-minwords">
        <option value="2">2 words</option>
        <option value="4" selected>4 words</option>
        <option value="6">6 words</option>
      </select>
    </div>
    <div class="panel-row">
      <label>Translation</label>
      <label class="toggle">
        <input type="checkbox" id="setting-translation" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Manual ask panel -->
  <button id="manual-toggle" class="panel-toggle">▾ Ask a Question</button>
  <div id="manual-panel" class="bottom-panel" style="display:none">
    <textarea id="manual-text" placeholder="Type or paste an interview question to practice..."></textarea>
    <button id="manual-ask">Ask</button>
  </div>

  <!-- Resume panel -->
  <button id="resume-toggle" class="panel-toggle">▾ Resume / Background</button>
  <div id="resume-panel" class="bottom-panel" style="display:none">
    <textarea id="resume-text" placeholder="Paste your resume or background info here for personalized answers..."></textarea>
    <button id="resume-save">Save</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
